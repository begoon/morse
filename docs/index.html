  <body>
    <div id="output"> </div>
    <div id="pattern"> </div>
    <div id="hints"></div>

    <details class="cheatsheet" open>
      <summary>Cheatsheet</summary>
      <div id="cheatsheet"></div>
    </details>

    <details class="settings">
      <summary>Settings</summary>
      <div class="panel">
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="letters">Learn letters</option>
        <option value="keying">Keying</option>
      </select>
      <span></span>

      <label for="keyType">Key</label>
      <select id="keyType">
        <option value="paddle">Iambic paddle</option>
        <option value="straight">Straight key</option>
      </select>
      <span></span>

      <label for="iambicMode">Keyer mode</label>
      <select id="iambicMode">
        <option value="A">Mode A</option>
        <option value="B">Mode B</option>
      </select>
      <span></span>

      <label for="language">Language</label>
      <select id="language">
        <option value="en">English</option>
        <option value="ru">Русский</option>
      </select>
      <span></span>

      <label for="wpm">Speed</label>
      <input id="wpm" type="range" min="3" max="40" step="1" />
      <span class="val"><span id="wpmVal">5</span> wpm</span>

      <label for="gap">Gap tolerance</label>
      <input id="gap" type="range" min="1" max="3" step="0.1" />
      <span class="val"><span id="gapVal">1.5×</span></span>

      <label for="volume">Volume</label>
      <input id="volume" type="range" min="0" max="1" step="0.01" />
      <span></span>

      <label for="tone">Tone</label>
      <input id="tone" type="range" min="400" max="1000" step="10" />
      <span class="val"><span id="toneVal">600</span> Hz</span>

      <button id="clear">Clear output</button>
      </div>
    </details>

    
  </body>
</html>
