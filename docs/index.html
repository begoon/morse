<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morse Trainer</title>
    
  <style>:root{--buncss-light:initial;--buncss-dark: ;color-scheme:light;--bg:#f5f7fa;--panel:#fff;--fg:#1c2430;--muted:#5d6b7a;--accent:#0e87b6;--accent-dim:#8ccfe8;--ok:#1f883d;--line:#d0d7de}*{box-sizing:border-box}body{background:var(--bg);color:var(--fg);display:flex;flex-direction:column;align-items: center;gap:1.25rem;min-height:100vh;margin:0;padding:2rem 1rem 3rem;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Noto Sans,Ubuntu,Cantarell,Helvetica Neue,sans-serif}h1{letter-spacing:.04em;margin:0;font-size:1.4rem;font-weight:600}.topnav{display:flex;align-items:baseline;gap:1rem;width:100%;max-width:640px;font-size:.95rem}.topnav a{color:var(--muted);text-decoration:none}.topnav a:hover{color:var(--fg)}.topnav a:first-child{color:var(--fg);letter-spacing:.04em;margin-right:auto;font-weight:600}.topnav a.current{color:var(--accent)}.menu{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:480px}.menu-item{display:flex;background:var(--panel);border:1px solid var(--line);color:var(--fg);text-decoration:none;border-radius:12px;flex-direction:column;gap:.25rem;padding:1rem 1.25rem}.menu-item:hover{border-color:var(--accent-dim)}.menu-item strong{color:var(--accent);letter-spacing:.04em}.menu-item span{color:var(--muted);font-size:.9rem}#output{display:flex;background:var(--panel);border:1px solid var(--line);letter-spacing:.1em;white-space:pre;overflow:hidden;border-radius:12px;justify-content:center;align-items: center;width:100%;min-height:4rem;padding:.75rem 1.25rem;font-family:SF Mono,ui-monospace,Cascadia Code,monospace;font-size:clamp(1.5rem,4vw,2.75rem);font-weight:600}#pattern{color:var(--accent);letter-spacing:.3em;min-height:2rem;font-family:SF Mono,ui-monospace,monospace;font-size:1.75rem}.challenge{cursor:pointer;color:var(--accent)}.challenge .slot{display:inline-block;text-align:center;min-width:.8em;margin:0 .06em}.challenge .slot.done{color:var(--fg)}.challenge-morse{color:var(--muted);letter-spacing:.1em;margin-left:.6em;font-family:SF Mono,ui-monospace,monospace;font-size:.5em}#output{transition:color .12s ease-out}#output.ok{color:var(--ok)}#output.bad{color:#cf222e}#history{color:var(--muted);letter-spacing:.15em;white-space:pre;overflow:hidden;max-width:100%;min-height:1.4em;font-family:SF Mono,ui-monospace,Cascadia Code,monospace;font-size:1.1rem}#hints{color:var(--muted);text-align:center;min-height:1.2em;font-size:.9rem}.panel{display:grid;grid-template-columns:max-content 1fr max-content;align-items: center;gap:.9rem 1rem;padding:.75rem .5rem .5rem}.panel label{color:var(--muted);font-size:.9rem}.panel select,.panel input[type=range]{width:100%}.panel input[type=number]{font:inherit;background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:6px;justify-self:start;width:5rem;padding:.25rem .5rem}.panel .val{font-variant-numeric:tabular-nums;color:var(--fg);text-align:right;min-width:3.5rem}.settings .note{color:var(--muted);margin:.75rem .5rem 0;font-size:.85rem;line-height:1.4}button#clear{grid-column:1/-1;color:var(--accent);border:1px solid var(--accent-dim);cursor:pointer;background:0 0;border-radius:8px;justify-self:start;padding:.4rem .9rem;font-size:.9rem}button#clear:hover{background:var(--accent-dim);color:var(--fg)}.cheatsheet,.settings{background:var(--panel);border:1px solid var(--line);border-radius:12px;width:100%;padding:.6rem 1rem 1rem}.cheatsheet summary,.settings summary{cursor:pointer;color:var(--muted);letter-spacing:.04em;user-select:none;padding:.4rem 0;font-size:.95rem}.cheat-board{display:flex;flex-wrap:wrap;justify-content:center;align-items: center;gap:.6rem;margin-top:.5rem}.cheat-keyboard{display:flex;flex-direction:column;gap:.3rem}.cheat-punct{display:flex;flex-direction:column;align-self: flex-start;gap:.3rem}.cheat-row{display:flex;flex-wrap:nowrap;gap:.3rem}.cheat-key{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:6px;flex-direction:column;flex:none;align-items: center;gap:.15rem;min-width:2.4rem;padding:.25rem .35rem}.cheat-key .cheat-char{font-size:.95rem}.cheat-key.target{border-color:var(--accent);background:#0e87b61f}.cheat-key.target .cheat-char{color:var(--accent)}.cheat-key .cheat-pattern{font-size:.7rem}@keyframes key-splash{0%{background:var(--ok);border-color:var(--ok);transform:scale(1.18)}to{background:var(--bg);border-color:var(--line);transform:scale(1)}}.cheat-key.splash{animation:key-splash .35s ease-out}.hide-morse .cheat-pattern{display:none}.hide-morse .cheat-key.reveal .cheat-pattern{display:block}.cheat-char{min-width:1.1em;font-weight:600}.cheat-pattern{color:var(--accent);letter-spacing:.02em;font-family:SF Mono,ui-monospace,monospace}
</style><script type="module"></script></head>
