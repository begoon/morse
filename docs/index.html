rder:1px solid var(--line);border-radius:6px;flex-direction:column;flex:none;align-items: center;gap:.15rem;min-width:2.4rem;padding:.25rem .35rem}.guessable .cheat-key{cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}.cheat-key .cheat-char{font-size:.95rem}.cheat-key.target{border-color:var(--accent);background:#0e87b61f}.cheat-key.target .cheat-char{color:var(--accent)}.cheat-key .cheat-pattern{font-size:.7rem}@keyframes key-splash{0%{background:var(--ok);border-color:var(--ok);transform:scale(1.18)}to{background:var(--bg);border-color:var(--line);transform:scale(1)}}.cheat-key.splash{animation:key-splash .35s ease-out}.hide-morse .cheat-pattern{display:none}.hide-morse .cheat-key.reveal .cheat-pattern{display:block}.cheat-char{min-width:1.1em;font-weight:600}.cheat-pattern{color:var(--accent);letter-spacing:.02em;font-family:SF Mono,ui-monospace,monospace}@media (max-width:480px){body{gap:.75rem;padding:.75rem .3rem 1.5rem}.cheatsheet,.settings{padding:.5rem .5rem .75rem}.cheat-board{gap:.4rem}.cheat-row{flex-wrap:wrap;margin-left:0!important}.cheat-punct{flex-flow:wrap;align-self:stretch}.cheat-key{min-width:1.9rem;padding:.2rem .25rem}.cheat-key .cheat-char{font-size:.8rem}.cheat-key .cheat-pattern{font-size:.6rem}}
