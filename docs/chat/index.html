<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morse Trainer — Chat</title>
    <style>
      .chat {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        width: 100%;
        max-width: 640px;
      }
      .chat-col {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        min-width: 0;
      }
      .chat-col h2 {
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0;
      }
      .chat-log {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.6rem;
        height: 40vh;
        overflow-y: auto;
      }
      .chat-ai .chat-log {
        align-items: flex-end;
        text-align: right;
      }
      .chat-msg {
        font-size: 0.95rem;
        line-height: 1.35;
        padding: 0.35rem 0.55rem;
        border-radius: 8px;
        background: var(--bg);
        max-width: 95%;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .chat-ai .chat-msg {
        background: var(--accent-dim);
        color: var(--fg);
      }
      .chat-msg.pending {
        color: var(--muted);
      }
      .chat-msg.error {
        background: transparent;
        color: #b3261e;
        font-size: 0.85rem;
      }
      .chat-msg .morse {
        font-family: "SF Mono", ui-monospace, "Cascadia Code", monospace;
        letter-spacing: 0.08em;
        color: var(--accent);
        display: block;
        margin-top: 0.15rem;
      }
      .chat-ai .chat-msg .morse {
        color: var(--fg);
      }
      .chat-live {
        min-height: 1.4em;
        font-family: "SF Mono", ui-monospace, "Cascadia Code", monospace;
        font-size: 1rem;
        color: var(--accent);
        padding: 0.2rem 0.1rem;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      /* Playback highlight: current letter (whole letter) + current element. */
      .chat-msg .ltr,
      .chat-msg .m-ltr,
      .chat-msg .m-el {
        padding: 0 1px;
        border-radius: 3px;
      }
      .chat-msg .ltr.active,
      .chat-msg .m-ltr.active {
        background: var(--accent);
        color: #fff;
      }
      .chat-msg .m-el.playing {
        background: #fff;
        color: var(--accent);
      }
      .chat-toggles {
        display: flex;
        gap: 0.9rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .chat-toggles label {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        cursor: pointer;
      }
    </style>
