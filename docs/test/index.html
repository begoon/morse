ransmitter.","orientation of the antenna.","transmitted frequency.","ionosphere."],answer:1},{paper:1,n:15,ref:"4E1-2025-Foundation2611",question:"A radio amateur decides to erect a second dipole of the same type but a different length. This is done because",options:["the second antenna will be kept as a spare.","the second antenna is intended to be used on a different frequency.","the amateur wants to talk to two friends at the same time.","two antennas will give a stronger signal than one."],answer:1},{paper:1,n:16,ref:"5A1-2025-Foundation2629",question:"A mobile VHF radio receiver is fitted in a car. The car is driven along a clear open road directly away from the transmitter but is always in sight of the transmitter. The received signal will",options:["remain a constant strength or level all the time the transmitter is in sight.","vanish once the transmit aerial is too small to be seen.","get stronger as the distance increases.","get weaker as the distance increases."],answer:3},{paper:1,n:17,ref:"5C1-2025-Foundation1339",question:"Ducting is a propagation effect that",options:["extends the range of HF signals.","reduces the range of VHF and UHF signals.","extends the range of VHF and UHF signals.","reduces the range of HF signals."],answer:2},{paper:1,n:18,ref:"6A1-2025-Foundation2642",question:"The avoidance of interference between two items of electrical equipment is known as",options:["SWR.","VHF.","EMF.","EMC."],answer:3},{paper:1,n:19,ref:"6B1-2025-Foundation2659",question:"Which of the following modes of transmission is MOST likely to cause interference to nearby radio or television receivers?",options:["SSB.","FM voice.","FM data.","PSK31 (a data mode)."],answer:0},{paper:1,n:20,ref:"6G1-2025-Foundation1388",question:"A case of interference is proving difficult to solve. Before calling Ofcom, who else may be able to help you?",options:["British Telecom.","The local broadcast radio station.","The local authority.","The RSGB EMC committee."],answer:3},{paper:1,n:21,ref:"7A1-2025-Foundation2678",question:"Before making an initial call a radio amateur should",options:["listen on the frequency.","make an entry in the log book.","log the frequency.","check the transmitter power."],answer:0},{paper:1,n:22,ref:"7B1-2025-Foundation2992",question:"Band Plans are published because",options:["it allows the different modes and types of transmission to best share the band.","it is a convenient way of remembering the schedule to the amateur licence.","it is illegal to operate in contravention of the band plan.","it allocates most of the band to the higher power stations."],answer:0},{paper:1,n:23,ref:"7D1-2025-Foundation2955",question:"Connecting anything to the Microphone socket of a transmitter other than the supplied microphone may",options:["cause incorrect operation of the PTT.","cause a decrease in SWR.","cause an increase SWR.","cause changes in the received signal."],answer:0},{paper:1,n:24,ref:"8A1-2025-Foundatio3161",question:"High voltages may cause",options:["poor audio reception.","overheating.","poor signal strength.","electrocution."],answer:3},{paper:1,n:25,ref:"8B1-2025-Foundation1113",question:"A risk when drilling metal is",options:["the centre punch will mark the work.","swarf will fly up towards the eyes.","the drill bit will become blunt.","an electric shock may occur."],answer:1},{paper:1,n:26,ref:"8D1-2025-Foundation1121",question:"The main detrimental effect on health of being too close to a high power transmission is",options:["repetitive strain injury.","heating of body tissue.","loss of memory.","premature deafness."],answer:1},{paper:2,n:1,ref:"1A3-2025-Foundation3203",question:"If you move house and want to transmit from your new home, you must",options:["give immediate notice of the new address to Ofcom.","pay a supplementary licence fee.","notify the local police by letter.","inform RSGB headquarters by e-mail or phone."],answer:0},{paper:2,n:2,ref:"1A4-2025-Foundation2450",question:"The Licensees 30MHz to 300MHz."],answer:3},{paper:2,n:9,ref:"2F2-2025-Foundation8003",question:"An Analogue to Digital convertor (ADC)",options:["Changes AF signals to RF.","Is an optional component in a Software Defined Radio Receiver.","Samples an analogue signal and creates a digital representation of it.","Creates a digital signal in analogue format."],answer:2},{paper:2,n:10,ref:"3A2-2025-Foundation2201",question:"A transmission is heard using a few audio tones sent in succession. It is likely to be",options:["a repeater tone burst.","data.","an encrypted signal.","music."],answer:1},{paper:2,n:11,ref:"3C1-2025-Foundation2559",question:"The oscillator stage of a transmitter",options:["will cause interference unless built in a plastic enclosure or box.","is only needed if the user wishes to send Morse code.","defines the transmitted frequency.","determines the tone of the audio signal."],answer:2},{paper:2,n:12,ref:"3H2-2025-Foundation3461",question:"In the block diagram of a radio receiver shown, what is the function of the box marked '2'?",options:["Modulation.","Tuning and RF amplifier.","Detection.","Audio amplifier."],answer:2},{paper:2,n:13,ref:"4A2-2025-Foundation7728",question:"The proportion of the radio signal lost in a feeder will",options:["decrease as the frequency increases.","increase as the frequency increases.","stay much the same at any frequency.","depend on the type of modulation."],answer:1},{paper:2,n:14,ref:"4C1-2025-Foundation3067",question:"The polarisation of the radio wave from the antenna shown is",options:["horizontal.","unknown.","sideways.","vertical."],answer:0},{paper:2,n:15,ref:"4E2-2025-Foundation2914",question:"Which one of the following should be used to indicate the reflected power in a feeder to an antenna?",options:["An absorption wave-metre.","A digital multi-meter.","An oscilloscope.","An SWR meter."],answer:3},{paper:2,n:16,ref:"5A2-2025-Foundation1719",question:"The troposphere",options:["is the region above the ionosphere.","absorbs radio waves at night.","is the region below the ionosphere.","is ionised only during the day."],answer:2},{paper:2,n:17,ref:"5C2-2025-Foundation1725",question:"Attenuation of UHF signals can be caused by",options:["carbon dioxide.","fog.","falling snow.","ozone."],answer:2},{paper:2,n:18,ref:"6A2-2025-Foundation2944",question:"The ability of a piece of equipment to withstand a level of interference is known as",options:["immunity.","filtering.","compatibility.","resistance."],answer:0},{paper:2,n:19,ref:"6C1-2025-Foundation2650",question:"An amateur transmitter is designed to radiate from the antenna. How might signals enter other electrical devices in the house?",options:["By being picked up by mains wires leading to the affected device.","By direct radiation out of the front panel of the transmitter.","By being conducted along the microphone lead.","By radiating from the Morse key."],answer:0},{paper:2,n:20,ref:"6G2-2025-Foundation1075",question:"If a neighbour complains of interference from your station you should first",options:["keep a log of your transmissions and ask your neighbour to log instances of interference.","ask the neighbour to demonstrate the problem.","check that you have been operating in accordance with the licence Schedule.","check that your licence has not expired."],answer:0},{paper:2,n:21,ref:"7A2-2025-Foundation2682",question:"When calling CQ on a VHF FM calling channel, a radio amateur should",options:['give the call sign 2 or 3 times and say "CQ" when somebody replies.','say "CQ" 2 or 3 times and give the call sign, then listen for a reply.','say "CQ" a number of times and give the call sign when a contact is established.','say "CQ" about 20 times and listen for a reply.'],answer:1},{paper:2,n:22,ref:"7B2-2025-Foundation3046",question:"Radio astronomy has the use of the frequency band",options:["87.5-108.0MHz.","150.05-152.0MHz.","156.0-158.525MHz.","144.0-146.0MHz."],answer:1},{paper:2,n:23,ref:"7E2-2025-Foundation1087",question:"A good received SSB voice signal may be reported as",options:["five and eight.","one one one.","nine nine nine.","eight and five."],answer:0},{paper:2,n:24,ref:"8A3-2025-Foundation2962",question:"The correct connections for a 3 core cable to a UK mains plug are",options:["blue to N, brown to L, green/yellow to E.","brown to L, blue to E, green/yellow to N.","brown to N, blue to L, green/yellow to E.","blue to L, brown to E, yellow/green to N."],answer:0},{paper:2,n:25,ref:"8B7-2025-Foundation1455",question:"When not being used, a hot soldering iron should be",options:["placed in cold water.","wiped clean of old solder.","put in a well ventilated room.","placed in a suitable stand."],answer:3},{paper:2,n:26,ref:"8D2-2025-Foundation2110",question:"The ICNIRP is the body which advises on",options:["protective multiple earthing.","amateur band planning.","safe levels of RF exposure.","curing EMC problems."],answer:2},{paper:3,n:1,ref:"1A2-2025-Foundation2437",question:"Which item below is a type of UK amateur licence?",options:["Intermediate.","Senior.","Technician.","Beginner."],answer:0},{paper:3,n:2,ref:"1A4-2025-Foundation2452",question:"The Station callsign must be transmitted",options:["when the entry is made in the log book.","at the end of each transmission.","every half hour and when the Station is closing down.","at the beginning of a transmission on a new frequency."],answer:3},{paper:3,n:3,ref:"1C2-2025-Foundation2463",question:"Which of the following messages is NOT permitted by the Foundation licence?",options:['A reply to a "CQ" call.',"Agreeing to meet at the radio club.","A secret message to a radio amateur friend.","A message in Morse code."],answer:2},{paper:3,n:4,ref:"1D2-2025-Foundation2189",question:"When MUST a Foundation licensee keep a log of transmissions?",options:["When in another Region of the UK.","When a contest is being held in the same frequency band as you are operating.","When operating from a Temporary Location.","When instructed to do so oundation2664",question:"What is the purpose of a ferrite ring on the mains lead of an equipment found likely to suffer from interference?",options:["The ferrite ring will ensure the interference on each of the mains wires is equal.","The ferrite ring will avoid the need for the equipment to be earthed.","The ferrite ring will minimise unwanted signals leaking out of the affected equipment.","The ferrite ring will minimise any RF on the mains lead from entering the equipment."],answer:3},{paper:3,n:20,ref:"6G1-2025-Foundation1907",question:"Which organisation produces guidance on dealing with cases of interference?",options:["The Radio Society of Great Britain.","The local authority planning department.","The Police.","A User Service."],answer:0},{paper:3,n:21,ref:"7A3-2025-Foundation2688",question:"The reason for having a calling channel is to",options:["follow the licence conditions.","maximise interference to other callers.","contact other club members.","provide a known frequency where contacts may be established."],answer:3},{paper:3,n:22,ref:"7C1-2025-Foundation232",question:"During a conversation via a UHF amateur repeater it is noted that after a couple of minutes a beeping tone is heard on the audio of the repeater. It is likely that this tone",options:["indicates a malfunction in the repeater.","is a time-out tone added to overly long 'overs'.","is due to a beat note between the input and output audio signals.","indicates the need for CTCSS access to the repeater."],answer:1},{paper:3,n:23,ref:"7G1-2025-Foundation204",question:"Which of the following frequencies should be avoided for terrestrial contacts?",options:["145.900MHz.","144.050MHz.","145.500MHz.","144.300MHz."],answer:0},{paper:3,n:24,ref:"8A5-2025-Foundatio8015",question:"An important difference between a fuse and an RCBO (Residual current Circuit Breaker with Overload protection) is that",options:["a fuse protects against excessive currents but an RCBO will also detect small currents to earth."
