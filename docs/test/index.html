It is AM signals that vary in amplitude (height). FM signals are of the same height, but vary in frequency.`},{tag:"hamtrain",paper:6,n:11,question:"A transmitter must be connected to a correctly matched antenna system. Use of a mismatched antenna system (with a very poor SWR) runs the risk of damage to what?",options:["The antenna feed point","The feeder","The microphone amplifier","The RF power amplifier"],answer:3,explanation:"The RF Power Amplifier is connected to the antenna and can be damaged by power being reflected back from a mismatched antenna."},{tag:"hamtrain",paper:6,n:12,question:"In a Software Defined Radio receiver, what enables all of the radio signals to be sifted into separate frequency components?",options:["The D-to-A converter","The A-to-D converter","The demodulator","A mathematical operation in software"],answer:3,explanation:"A mathematical operation in the Digital Processor stage sifts the signals into separate frequency components. Refer to the SDR receiver block diagram in the training material."},{tag:"hamtrain",paper:6,n:13,question:"A long length of coaxial feeder cable may exhibit what?",options:["Gain","Loss","Dummy loads","ERP"],answer:1,explanation:"A long length of coaxial feeder cable is likely to exhibit 'loss'. Thicker, high-quality cable helps to reduce loss."},{tag:"hamtrain",paper:6,n:14,question:"10 Watts EIRP (Effective Isotropic Radiated Power) is equivalent to what value of ERP?",options:["1.6W ERP","6.1W ERP","16.1W ERP","11.6W ERP"],answer:1,explanation:`10 Watts EIRP (gain relative to a theoretical antenna) is equal to 6.1 Watts ERP (gain relative to a dipole).

Why does this answer matter? Ofcom quotes EMF exposure limits as 10W EIRP in the licence, which is equivalent to 6.1W ERP, and so this is a common value amateurs need to know for antenna assessments. It is also a common exam question!`},{tag:"hamtrain",paper:6,n:15,question:"An antenna correctly connected to a transmitter, but used on the wrong band, could",options:["Damage the antenna","Reduce the SWR on the feeder","Increase the ERP from the antenna","Reflect some of the power back down the feeder"],answer:3,explanation:"An antenna connected to a transmitter, but used on the wrong band, could reflect some of the power back down the feeder, potentially damaging the transmitter. An AMU (Antenna Matching Unit) can be used to match the antenna impedance."},{tag:"hamtrain",paper:6,n:16,question:"What effect does ultraviolet radiation normally have on propagation?",options:["A negative effect on HF propagation","A positive effect on HF propagation","A negative effect on VHF propagation","A positive effect on VHF propagation"],answer:1,explanation:"Ionisation of the Ionosphere is caused mainly by ultraviolet radiation from the sun. This has a positive effect on HF propagation."},{tag:"hamtrain",paper:6,n:17,question:"The range that your FM signals can reach on VHF/UHF frequencies is mainly dependent on 4 things - antenna height, antenna gain, transmitter power and what else?",options:["The amount of UV from the sun reaching the Ionosphere","Air quality","Lack of obstructions between the transmit and receive antennas","The amplitude of the modulated waveform"],answer:2,explanation:`Obstructions blocking the "line of sight", such as buildings, hills, etc, is the other factor affecting the range of VHF/UHF signals.

If you answered "amount of UV from the sun reaching the Ionosphere", that's for HF, not VHF/UHF signals.`},{tag:"hamtrain",paper:6,n:18,question:"What is the most likely reason that one piece of electrical equipment is more susceptible to interference than another?",options:["It has a lower immunity","It may not have a mains earth connection","It uses AC, not DC voltage","It has not been repaired correctly"],answer:0,explanation:'The ability of any piece of equipment to function correctly in the presence of strong RF signals is known as "immunity". A lower immunity means the equipment is more likely to be affected.'},{tag:"hamtrain",paper:6,n:19,question:"You are contacting someone very close to you. Why might you want to reduce your transmitter power?",options:["Less likely to over-modulate","Less likely to cause interference","To save on their battery","Less likely to over-deviate"],answer:1,explanation:"You should ideally only use the power that you need to make a contact. If you can make contact at 1 Watt, you don't need to use 10 Watts. By using unneeded power, you could be causing interference to other people who want to use that frequency, as well as possibly causing EMC issues."},{tag:"hamtrain",paper:6,n:20,question:"From an EMC perspective, why might it be useful to keep a log of transmissions?",options:["To prove you are operating within your licence conditions","To have a list of people who can vouch for your contact","In case Ofcom asks to see it during an inspection","To help identify if you may be the cause of interference"],answer:3,explanation:"In cases of possible interference, it would be useful to keep a log of transmissions to help identify whether or not you may be the cause of any interference."},{tag:"hamtrain",paper:6,n:21,question:"When keeping a log, it is recommended that you log the callsign of the station worked, the date of the contact, and what else?",options:["Local time, mode, location","Distance, operator name and frequency","Mode and UTC","Operator name, frequency and signal strength"],answer:2,explanation:'The exam syllabus states that, as a minimum, a log should contain: "date, time (in UTC), mode, and the call sign of station worked"'},{tag:"hamtrain",paper:6,n:22,question:"On what frequency might you expect to be able to hear signals from the International Space Station?",options:["14.099MHz","144.370MHz","145.200MHz","145.800MHz"],answer:3,explanation:`Refer to the 2m band plan that is printed on page 4 of the 4-page exam booklet. Almost at the bottom of the 2m band plan, you'll see an entry on 145.800MHz for "FM/DV Space Communications (e.g. ISS) - Space-to-Earth"

If you chose 145.200, that is Earth-to-Space, not Space-to-Earth.`},{tag:"hamtrain",paper:6,n:23,question:"If you borrow a friend's 5-Watt DV radio, what should you check?",options:["Whether your licence allows you to borrow equipment","That someone else's callsign is not embedded in software","That the radio settings are not in a foreign language","That the CTCSS tones are correct for your digital repeater"],answer:1,explanation:"It is common for callsigns to be set up in software on a DV radio, and for these to be automatically transmitted. If you don't change the callsign and transmit with someone else's callsign (not under supervision), you are technically in breach of the licence."},{tag:"hamtrain",paper:6,n:24,question:"If making changes to your home earthing arrangements, special care is needed. Who should you consult?",options:["Your Council Planning Officer","Ofcom","A competent professional","The ICNIRP"],answer:2,explanation:"Special care is needed with earthing arrangements, and a competent professional must be consulted prior to making any modifications."},{tag:"hamtrain",paper:6,n:25,question:"When is it recommended that eye protection be worn?",options:["To prevent solder or flux from splashing into the eyes","When erecting an antenna","When up a ladder","When adjusting the elements of an antenna whilst it is transmitting"],answer:0,explanation:"For safety reasons, to prevent solder or flux from splashing into the eyes, eye protection should be worn whilst soldering."},{tag:"hamtrain",paper:6,n:26,question:"Which of the following statements is FALSE:",options:["Antennas and feeders must be sited away from overhead power cables","Headphones can be dangerous","You should not touch antennas when they are transmitting","Equipment should be earthed to copper central heating pipes"],answer:3,explanation:"This question relates to safety. It is not true that equipment should be earthed to copper central heating pipes. Never use heating pipes as an earth, as this is dangerous."},{tag:"hamtrain",paper:7,n:1,question:"What are the three UK Amateur Radio licence levels?",options:["Beginner, Intermediate, Advanced","Foundation, Advanced, Full","Foundation, Intermediate, Full","Technical, General, Extra"],answer:2},{tag:"hamtrain",paper:7,n:2,question:"Your licence requires you to ensure that your station is clearly identifiable. Which of the following is the recommended practice for giving your callsign?",options:["At least once every 15 minutes","When transmitting on a frequency and as frequently as practicable","At least once per transmission","When transmitting on a new frequency and when leaving a frequency"],answer:1},{tag:"hamtrain",paper:7,n:3,question:"What is the correct term for a conversation with 3 or more amateurs with whom communication and identification has been established?",options:["A 'Net'","A 'Sked'","A 'CQ'","A 'Group'"],answer:0},{tag:"hamtrain",paper:7,n:4,question:"Under what circumstances does Ofcom have the right to close down your amateur radio station?",options:["You are in breach of your licence conditions","You have not transmitted in over a year","You operate from a location other than your home address","You use a mode other than voice"],answer:0},{tag:"hamtrain",paper:7,n:5,question:"Which statement is TRUE for the frequency 0.1357MHz?",options:["You cannot use more than 1 watt erp","You cannot use this frequency for satellite comms","Priority has to be given to other users","The other 3 answers are all true"],answer:3},{tag:"hamtrain",paper:7,n:6,question:"Restrictions apply for signals radiated over 10 watts EIRP (6.1 watts ERP). Why?",options:["To ensure that members of the public are not exposed to high EMF limits","To prevent interference with other spectrum users","To reduce interference to other countries","To protect the transmitter from damage"],answer:0},{tag:"hamtrain",paper:7,n:7,question:"Which of the following is NOT an insulator?",options:["Rubber","Ceramic","Glass","Brass"],answer:3},{tag:"hamtrain",paper:7,n:8,question:"As the wavelength of a transmitted amplitude modulated radio signal increases, what happens to its frequency?",options:["Frequency increases","Frequency decreases","Frequency does not alter","More cycles per second generated"],answer:1},{tag:"hamtrain",paper:7,n:9,question:"What does the following diagram represent?",options:["An ACD","An ADC","A DCA","A DAC"],answer:1,image:"mock7-q9.png"},{tag:"hamtrain",paper:7,n:10,question:"What is this?",options:["A Continuous Wave (Morse)","A carrier waveform","A modulated waveform","An audio waveform"],answer:2,image:"mock7-q10.png"},{tag:"hamtrain",paper:7,n:11,question:"In the following diagram, what function is performed by Box 3?",options:["RF Power Amplifier","Oscillator","Modulator","Audio Stage"],answer:1,image:"mock7-q11.png"},{tag:"hamtrain",paper:7,n:12,question:"What is the name given to a device designed to recover information sent from one place to another using electromagnetic radiation?",options:["A radio receiver","A modulator","A DAC","An RF Power Amplifier"],answer:0},{tag:"hamtrain",paper:7,n:13,question:"A long length of co-ax feeder cable may exhibit what?",options:["Gain","Loss","Dummy loads","ERP"],answer:1},{tag:"hamtrain",paper:7,n:14,question:"An amateur radio antenna will",options:["pick up radio waves and convert them into electrical signals","always require planning permission","work equally well at all frequencies","require an RF earth equal to half the antenna length"],answer:0},{tag:"hamtrain",paper:7,n:15,question:"What type of connector is this?",options:["BNC","SMA","PL-259","N-Type"],answer:0,image:"mock7-q15.png"},{tag:"hamtrain",paper:7,n:16,question:"Radio waves can be what...?",options:["Refracted","Diffracted","Reflected","All of the above"],answer:3},{tag:"hamtrain",paper:7,n:17,question:"Which of the following has the least effect on local VHF/UHF radio signals?",options:["Hills","Buildings","Bad weather","Reflected signals from the Ionosphere"],answer:3},{tag:"hamtrain",paper:7,n:18,question:"Amateur radio signals are least likely to interfere with what?",options:["A microwave oven","A CCTV camera","A wi-fi router","A computer monitor"],answer:0},{tag:"hamtrain",paper:7,n:19,question:"Which antenna would typically be the most problematic in terms of causing interference?",options:["Dipole","Yagi (beam) antenna","End-fed wire","1/4 wave groundplane"],answer:2},{tag:"hamtrain",paper:7,n:20,question:"From an EMC perspective, why might it be useful to keep a log of transmissions?",options:["To prove you are operating within your licence conditions","To have a list of people who can vouch for your contact","In case Ofcom asks to see it during an inspection","To help identify if you may be the cause of interference"],answer:3},{tag:"hamtrain",paper:7,n:21,question:"What can we tell about the callsign MM7QQQ/P?",options:["The station is operating from a temporary location","This is a UK Full licence holder","The operator is on the Isle of Man","The operator is mobile in Scotland"],answer:0},{tag:"hamtrain",paper:7,n:22,question:"Why do repeaters need two frequencies?",options:["To allow them to retransmit a received signal in real-time","For ease of radio programming","So that they can hear their own signal","To filter unwanted noise"],answer:0},{tag:"hamtrain",paper:7,n:23,question:"In which country are you NOT permitted to operate using your Foundation Licence?",options:["Scotland","France","Northern Ireland","Wales"],answer:1},{tag:"hamtrain",paper:7,n:24,question:"What is the correct wiring for a UK mains plug?",options:["Blue=Live ; Green/Yellow=Neutral ; Brown=Earth","Brown=Live ; Blue=Neutral ; Green/Yellow=Earth","Brown=Live ; Green/Yellow=Neutral ; Blue=Earth","Blue=Live ; Brown=Neutral ; Green/Yellow=Earth"],answer:1},{tag:"hamtrain",paper:7,n:25,question:"When must eye protection be worn?",options:["To prevent solder or flux from splashing into the eyes","When erecting an antenna","When up a
