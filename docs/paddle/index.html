<!doctype html>

    <title>Morse Trainer — Paddle test</title>
    <style>
      #pad {
        width: 100%;
        max-width: 640px;
        min-height: 38vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: var(--panel);
        border: 2px dashed var(--accent-dim);
        border-radius: 12px;
        color: var(--muted);
        font-size: 1.05rem;
        padding: 1rem;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #log {
        width: 100%;
        max-width: 640px;
        height: 34vh;
        font-family: "SF Mono", ui-monospace, "Cascadia Code", monospace;
        font-size: 0.78rem;
        line-height: 1.35;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.5rem 0.6rem;
        background: var(--panel);
        color: var(--fg);
        white-space: pre;
        overflow: auto;
      }
    </style>
