<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morse Trainer — Keying</title>
  </head>
  <body>
    <nav class="topnav">
      <a href="../">Morse Trainer</a>
      <a href="../play/">Play</a>
      <a href="../keying/" class="current" aria-current="page">Keying</a>
      <a href="../test/">Test</a>
      <a href="../settings/">Settings</a>
    </nav>

    <div id="output" class="multiline"> </div>

    <!-- Spacers push the keypad to about 3/4 down the screen (free space split
         3:1 above/below the keypad + cheatsheet block). -->
    <div class="grow grow-3"></div>

    <div class="keypad">
      <button id="key-dit" class="keypad-btn keypad-element" aria-label="dit">
        .
      </button>
      <button id="key-dah" class="keypad-btn keypad-element" aria-label="dah">
        -
      </button>
      <button id="clear" class="keypad-btn keypad-clear">Clear</button>
    </div>

    <details class="cheatsheet">
      <summary>Cheatsheet</summary>
      <div id="cheatsheet"></div>
    </details>

    <div class="grow grow-1"></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
